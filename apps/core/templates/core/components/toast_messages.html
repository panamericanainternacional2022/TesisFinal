{% if messages %}
    <div class="toast-container" role="status" aria-live="polite">
        {% for message in messages %}
            <div class="toast-item {% if message.tags == 'success' %}toast-success js-alert-fadeable{% elif message.tags == 'warning' %}toast-warning{% elif message.tags == 'error' %}toast-error{% else %}toast-info{% endif %}">
                {% if message.tags != 'success' %}
                <button type="button" class="btn btn-icon toast-close" aria-label="Cerrar notificación"><i class="fa-solid fa-xmark" aria-hidden="true"></i></button>
                {% endif %}
                <div class="toast-body-content">
                    {{ message.message }}
                </div>
            </div>
        {% endfor %}
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Toast Notifications Slide-in
            const toastItems = document.querySelectorAll('.toast-item');
            toastItems.forEach((toast, idx) => {
                setTimeout(() => {
                    toast.style.transform = 'translateX(0)';
                    toast.style.opacity = '1';
                }, idx * 100 + 100);
            });

            // Helper to close and slide out toast
            function closeToast(toast) {
                toast.style.transform = 'translateX(120%)';
                toast.style.opacity = '0';
                setTimeout(() => {
                    toast.remove();
                }, 350);
            }

            // Auto-fade/slide out js-alert-fadeable messages after 5 seconds
            toastItems.forEach(toast => {
                if (toast.classList.contains('js-alert-fadeable')) {
                    setTimeout(() => {
                        closeToast(toast);
                    }, 5000);
                }
            });
        });
    </script>
{% endif %}
